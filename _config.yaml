# site properties and page defaults
title: Lomberk Laboratory
subtitle: Epigenomics Discovery & Therapeutics
description: The Lomberk Laboratory investigates how epigenomic regulators, including chromatin-modifying enzymes and remodeling complexes, control gene expression programs downstream of oncogenic signaling, shape DNA damage responses, and drive disease progression in cancers such as pancreatic cancer. Our work spans mechanistic discovery to translational impact, using cell-based assays, patient-derived model systems, and mouse models to identify vulnerabilities that can be targeted therapeutically.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
